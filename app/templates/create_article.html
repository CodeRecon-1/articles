{% extends "base.html" %}

{% block content %}

<h1>Create Article</h1>

<form method="post">

    <input
        type="text"
        name="title"
        placeholder="Title"
        required
    >

    <textarea
        name="content"
        placeholder="Content"
        required
    ></textarea>

    <button type="submit">
        Create
    </button>

</form>

{% endblock %}
